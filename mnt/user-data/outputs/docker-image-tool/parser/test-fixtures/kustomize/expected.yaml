apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - base/

images:
  - name: nginx
    newName: gcr.io/distroless/nginx
    newTag: 3.99.0
  - name: redis
    newName: docker.io/library/redis
    newTag: 3.99.0
    digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  - name: app
    newName: docker.io/myorg/app
    newTag: latest
  - name: short
    newName: bare-without-domain
    newTag: 3.0.0
