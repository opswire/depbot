apiVersion: apps/v1
kind: Deployment
spec:
  template:
    spec:
      initContainers:
        - name: init
          image: "busybox:9.9.9@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      containers:
        - name: app
          image: registry.example.com:5000/myorg/app:9.9.9@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
---
apiVersion: helm/v3
values:
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: 9.9.9
    digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  postgresImage:
    image:
      repository: postgres
      tag: "9.9.9"
  templated:
    image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  notSemver:
    image: "ubuntu:latest"
---
on: push
jobs:
  build:
    steps:
      - uses: actions/checkout@v4
      - uses: docker://nginx:9.9.9@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
